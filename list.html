<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-green-50 flex items-center justify-center p-8">
    <div class="bg-white rounded-2xl shadow-sm border border-green-100 p-8 w-full max-w-md">

        <h2 class="text-xl font-semibold text-green-800 mb-4">Nama-Nama Buah (Unordered List)</h2>
        <ul class="space-y-2 mb-8">
            <li class="flex items-center gap-2 text-green-700 bg-green-50 rounded-lg px-4 py-2">
                <span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span>
                Mangga
            </li>
            <li class="flex items-center gap-2 text-green-700 bg-green-50 rounded-lg px-4 py-2">
                <span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span>
                Naga
            </li>
            <li class="flex items-center gap-2 text-green-700 bg-green-50 rounded-lg px-4 py-2">
                <span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span>
                Anggur
            </li>
            <li class="flex items-center gap-2 text-green-700 bg-green-50 rounded-lg px-4 py-2">
                <span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span>
                Pisang
            </li>
        </ul>

        <h2 class="text-xl font-semibold text-teal-800 mb-4">Ordered List</h2>
        <ol class="space-y-2 counter-reset-list">
            <li class="flex items-center gap-3 text-teal-700 bg-teal-50 rounded-lg px-4 py-2">
                <span class="w-6 h-6 rounded-full bg-teal-200 text-teal-800 text-sm font-medium flex items-center justify-center">1</span>
                Fayyadh
            </li>
            <li class="flex items-center gap-3 text-teal-700 bg-teal-50 rounded-lg px-4 py-2">
                <span class="w-6 h-6 rounded-full bg-teal-200 text-teal-800 text-sm font-medium flex items-center justify-center">2</span>
                Purkon
            </li>
            <li class="flex items-center gap-3 text-teal-700 bg-teal-50 rounded-lg px-4 py-2">
                <span class="w-6 h-6 rounded-full bg-teal-200 text-teal-800 text-sm font-medium flex items-center justify-center">3</span>
                Rahmat
            </li>
            <li class="flex items-center gap-3 text-teal-700 bg-teal-50 rounded-lg px-4 py-2">
                <span class="w-6 h-6 rounded-full bg-teal-200 text-teal-800 text-sm font-medium flex items-center justify-center">4</span>
                Tedy
            </li>
        </ol>

    </div>
</body>
</html>
